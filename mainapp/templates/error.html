{% extends 'base.html' %}

{% block main %}

<section class="error-page">

  <div class="container">

    <div class="error-wrapper">

      <div class="error-icon">

        <i class="fa-solid fa-triangle-exclamation"></i>

      </div>

      <h1 class="error-code">
        ERROR
      </h1>

      <h2 class="error-title">
        Something Went Wrong
      </h2>

      <p class="error-text">

        The page you are looking for is unavailable or
        an unexpected error occurred while processing your request.

      </p>

      {% if error %}

      <div class="error-detail-box">

        <h4>
          Error Details
        </h4>

        <p>
          {{ error }}
        </p>

      </div>

      {% endif %}

      <div class="error-buttons">

        <a href="{% url 'Index' %}" class="btn btn-red">

          <i class="fa-solid fa-house"></i>
          Back Home

        </a>

        <a href="{% url 'Recommendation' %}" class="btn btn-dark-outline">

          <i class="fa-solid fa-film"></i>
          Recommendation

        </a>

      </div>

    </div>

  </div>

</section>

{% endblock %}
